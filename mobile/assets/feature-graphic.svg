<svg width="1024" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  
  <!-- App Icon (centered-left) -->
  <circle cx="140" cy="250" r="80" fill="white"/>
  <text x="140" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="64" text-anchor="middle">🍽️</text>
  
  <!-- App Name -->
  <text x="260" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" fill="white">FoodLog</text>
  
  <!-- Tagline -->
  <text x="260" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="white" opacity="0.9">AI-Powered Calorie Tracking</text>
  
  <!-- Features -->
  <text x="260" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="white" opacity="0.8">📸 Snap · 🤖 AI Analyze · 📊 Track</text>
  
  <!-- Decorative elements -->
  <circle cx="900" cy="100" r="60" fill="white" opacity="0.1"/>
  <circle cx="950" cy="400" r="80" fill="white" opacity="0.1"/>
  <circle cx="800" cy="300" r="40" fill="white" opacity="0.05"/>
</svg>
